name: peraco
description: "PeraCo - Marketplace de productos frescos y locales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Navegacion
  go_router: ^14.7.2

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Backend - Supabase
  supabase_flutter: ^2.8.3

  # Utilidades
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1
  # Mapas y ubicacion
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

  # Graficas
  fl_chart: ^0.68.0

  # Imagenes
  image_picker: ^1.1.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

